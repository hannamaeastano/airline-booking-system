<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Carrot Air</title>
	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

	<!-- Google Font -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto&display=swap" rel="stylesheet">
	
	<!-- external css -->
	<link rel="stylesheet" type="text/css" href="./index.css">
</head>






<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Carrot Air</a>
            <div class="desktop-nav">
                <a class="nav-link" href="#">Book a Flight</a>
                <a class="nav-link" href="#">Check-in</a>
                <a class="nav-link" href="#">My Bookings</a>
                <a class="nav-link" href="#">Information</a>
                <a class="nav-link" href="#">Sign Up/Login</a>
            </div>
            <button class="navbar-toggler mobile-nav" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h4 class="text-center">Book Flight</h4>
        <div class="card">
            <div class="flight-option d-flex justify-content-around mb-3">
                <button id="oneway" class="active" onclick="setTripType('oneway')">One way</button>
                <button id="round" onclick="setTripType('round')">Round</button>
                <button id="multicity" onclick="setTripType('multicity')">Multicity</button>
            </div>
            
            <form>
                <div class="mb-3">
                    <label for="from">From</label>
                    <select class="form-control" id="from">
                        <option value="">Select Origin</option>
                        <option value="Manila">Manila (MNL) - Ninoy Aquino International Airport</option>
                        <option value="Cebu">Cebu (CEB) - Mactan-Cebu International Airport</option>
                        <option value="Davao">Davao (DVO) - Francisco Bangoy International Airport</option>
                        <option value="Clark">Clark (CRK) - Clark International Airport</option>
                        <option value="Iloilo">Iloilo (ILO) - Iloilo International Airport</option>
                        <option value="Bacolod">Bacolod (BCD) - Bacolod-Silay Airport</option>
                        <option value="Cagayan de Oro">Cagayan de Oro (CGY) - Laguindingan Airport</option>
                        <option value="Zamboanga">Zamboanga (ZAM) - Zamboanga International Airport</option>
                        <option value="Puerto Princesa">Puerto Princesa (PPS) - Puerto Princesa International Airport</option>
                        <option value="Kalibo">Kalibo (KLO) - Kalibo International Airport</option>
                        <option value="Tacloban">Tacloban (TAC) - Daniel Z. Romualdez Airport</option>
                        <option value="Butuan">Butuan (BXU) - Bancasi Airport</option>
                        <option value="Legazpi">Legazpi (LGP) - Bicol International Airport</option>
                        <option value="Roxas">Roxas (RXS) - Roxas Airport</option>
                        <option value="Surigao">Surigao (SUG) - Surigao Airport</option>
                        <option value="Dipolog">Dipolog (DPL) - Dipolog Airport</option>
                        <option value="Pagadian">Pagadian (PAG) - Pagadian Airport</option>
                        <option value="Ozamiz">Ozamiz (OZC) - Labo Airport</option>
                        <option value="Cotabato">Cotabato (CBO) - Awang Airport</option>
                        <option value="Tuguegarao">Tuguegarao (TUG) - Tuguegarao Airport</option>
                        <option value="Naga">Naga (WNP) - Naga Airport</option>
                        <option value="San Jose">San Jose (SJI) - San Jose Airport</option>
                        <option value="Busuanga">Busuanga (USU) - Francisco B. Reyes Airport</option>
                        <option value="Siargao">Siargao (IAO) - Sayak Airport</option>
                        <option value="Camiguin">Camiguin (CGM) - Camiguin Airport</option>
                        <option value="Siquijor">Siquijor (SQJ) - Siquijor Airport</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="to">To</label>
                    <select class="form-control" id="to">
                        <option value="">Select Destination</option>
                        <option value="Manila">Manila (MNL) - Ninoy Aquino International Airport</option>
                        <option value="Cebu">Cebu (CEB) - Mactan-Cebu International Airport</option>
                        <option value="Davao">Davao (DVO) - Francisco Bangoy International Airport</option>
                        <option value="Clark">Clark (CRK) - Clark International Airport</option>
                        <option value="Iloilo">Iloilo (ILO) - Iloilo International Airport</option>
                        <option value="Bacolod">Bacolod (BCD) - Bacolod-Silay Airport</option>
                        <option value="Cagayan de Oro">Cagayan de Oro (CGY) - Laguindingan Airport</option>
                        <option value="Zamboanga">Zamboanga (ZAM) - Zamboanga International Airport</option>
                        <option value="Puerto Princesa">Puerto Princesa (PPS) - Puerto Princesa International Airport</option>
                        <option value="Kalibo">Kalibo (KLO) - Kalibo International Airport</option>
                        <option value="Tacloban">Tacloban (TAC) - Daniel Z. Romualdez Airport</option>
                        <option value="Butuan">Butuan (BXU) - Bancasi Airport</option>
                        <option value="Legazpi">Legazpi (LGP) - Bicol International Airport</option>
                        <option value="Roxas">Roxas (RXS) - Roxas Airport</option>
                        <option value="Surigao">Surigao (SUG) - Surigao Airport</option>
                        <option value="Dipolog">Dipolog (DPL) - Dipolog Airport</option>
                        <option value="Pagadian">Pagadian (PAG) - Pagadian Airport</option>
                        <option value="Ozamiz">Ozamiz (OZC) - Labo Airport</option>
                        <option value="Cotabato">Cotabato (CBO) - Awang Airport</option>
                        <option value="Tuguegarao">Tuguegarao (TUG) - Tuguegarao Airport</option>
                        <option value="Naga">Naga (WNP) - Naga Airport</option>
                        <option value="San Jose">San Jose (SJI) - San Jose Airport</option>
                        <option value="Busuanga">Busuanga (USU) - Francisco B. Reyes Airport</option>
                        <option value="Siargao">Siargao (IAO) - Sayak Airport</option>
                        <option value="Camiguin">Camiguin (CGM) - Camiguin Airport</option>
                        <option value="Siquijor">Siquijor (SQJ) - Siquijor Airport</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-6">
                        <label for="departure">Departure</label>
                        <input type="date" class="form-control" id="departure">
                    </div>
                    <div class="col-6" id="returnSection" style="display:none;">
                        <label for="return">Return</label>
                        <input type="date" class="form-control" id="return">
                    </div>
                </div>
                <div class="row mt-3 mobile-stack">
                    <div class="col-6">
                        <label for="traveller">Traveller</label>
                        <div class="dropdown">
                            <button class="btn btn-secondary dropdown-toggle w-100" type="button" id="travellerDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                                <span id="traveller-summary">1 Adult</span>
                            </button>
                            <ul class="dropdown-menu" aria-labelledby="travellerDropdown">
                                <li class="dropdown-item">
                                    <span>Adults (12+ years)</span>
                                    <div>
                                        <button type="button" onclick="updatePassengers('adults', -1)">-</button>
                                        <span id="adults-count">1</span>
                                        <button type="button" onclick="updatePassengers('adults', 1)">+</button>
                                    </div>
                                </li>
                                <li class="dropdown-item">
                                    <span>Children (2-11 years)</span>
                                    <div>
                                        <button type="button" onclick="updatePassengers('children', -1)">-</button>
                                        <span id="children-count">0</span>
                                        <button type="button" onclick="updatePassengers('children', 1)">+</button>
                                    </div>
                                </li>
                                <li class="dropdown-item">
                                    <span>Infants (Under 2 years)</span>
                                    <div>
                                        <button type="button" onclick="updatePassengers('infants', -1)">-</button>
                                        <span id="infants-count">0</span>
                                        <button type="button" onclick="updatePassengers('infants', 1)">+</button>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <div class="col-6">
                        <label for="class">Class</label>
                        <select class="form-control" id="class">
                            <option value="economy">Economy</option>
                            <option value="business">Business</option>
                            <option value="first">First Class</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Search</button>
            </form>
        </div>
        <div class="hot-offer">
            <p>Meow meow…meow</p>
            <p>Meow meow…meow</p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Carrot Air. All rights reserved.</p>
        </div>
    </footer>



    <script src="./index.js"></script>
		<!-- bootstrap js -->
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
    <!-- JavaScript -->
    <script type="text/javascript" src="./index.js"></script>
</body>
</html>
